<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 星际电报员 - 外星人别回头！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 900px;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 50%, #0a0a1a 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* 星空背景 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #header {
            text-align: center;
            padding: 20px;
            color: white;
            position: relative;
            z-index: 10;
        }

        #header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            letter-spacing: 2px;
        }

        #score-display {
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }

        /* ===== 外星人容器 ===== */
        #alien-container {
            width: 300px;
            height: 350px;
            margin: 10px auto;
            position: relative;
            z-index: 5;
        }

        #alien {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* 背面（背身 - 安全状态） */
        .alien-back {
            position: absolute;
            width: 200px;
            height: 260px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateY(0deg);
            backface-visibility: hidden;
        }

        .alien-back-body {
            width: 200px;
            height: 250px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 50%, #009944 100%);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(0,255,136,0.3),
                inset 0 -20px 40px rgba(0,0,0,0.2);
        }

        /* 背身上的细节 - 显示这是背面 */
        .alien-back-body::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-bottom: none;
        }

        .alien-back-body::after {
            content: '';
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
        }

        /* 天线 - 从背后看 */
        .antenna-back {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .antenna-stick {
            width: 4px;
            height: 60px;
            background: linear-gradient(to top, #00ff88, #00ffcc);
            margin: 0 auto;
            border-radius: 2px;
        }

        .antenna-tip {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #ff00ff 0%, #cc00cc 100%);
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: antennaGlow 1.5s infinite;
        }

        @keyframes antennaGlow {
            0%, 100% { 
                box-shadow: 0 0 20px #ff00ff;
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
                transform: scale(1.2);
            }
        }

        /* 正面（转身 - 危险状态） */
        .alien-front {
            position: absolute;
            width: 200px;
            height: 260px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateY(180deg);
            backface-visibility: hidden;
        }

        .alien-front-body {
            width: 200px;
            height: 250px;
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 50%, #990000 100%);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(255,68,68,0.5),
                inset 0 -20px 40px rgba(0,0,0,0.3);
            transition: all 0.6s ease;
        }

        /* 眼睛 */
        .alien-eye {
            width: 55px;
            height: 65px;
            background: radial-gradient(circle, white 0%, #f0f0f0 100%);
            border-radius: 50%;
            position: absolute;
            top: 35%;
            transform: translateY(-50%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .alien-eye.left {
            left: 18%;
        }

        .alien-eye.right {
            right: 18%;
        }

        .alien-eye::after {
            content: '';
            width: 28px;
            height: 35px;
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 愤怒的眼睛 */
        #alien.turned .alien-eye {
            background: radial-gradient(circle, #ffcccc 0%, white 100%);
            transform: translateY(-50%) scaleY(0.7);
        }

        #alien.turned .alien-eye::after {
            background: radial-gradient(circle, #ff0000 0%, #1a1a2e 100%);
            transform: translate(-50%, -50%) scale(0.8);
        }

        /* 嘴巴 */
        .alien-mouth {
            width: 70px;
            height: 35px;
            border: 4px solid rgba(255,255,255,0.8);
            border-radius: 0 0 70px 70px;
            border-top: none;
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s ease;
        }

        /* 愤怒的嘴巴 */
        #alien.turned .alien-mouth {
            border-color: #ffcccc;
            border-radius: 70px 70px 0 0;
            border-bottom: none;
            border-top: 4px solid #ffcccc;
            height: 25px;
        }

        /* 天线 - 正面 */
        .antenna-front {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* ===== 转身动画 ===== */
        #alien.turned {
            transform: rotateY(180deg);
        }

        /* 状态文字 */
        #status-text {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #00ff88;
            margin: 15px 0;
            text-shadow: 0 0 20px #00ff88;
            animation: pulse 1.5s infinite;
            position: relative;
            z-index: 10;
        }

        #status-text.danger {
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444;
            animation: shake 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-8px) rotate(-1deg); }
            75% { transform: translateX(8px) rotate(1deg); }
        }

        /* 提示文字 */
        #hint-text {
            text-align: center;
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            margin: 5px 0;
            position: relative;
            z-index: 10;
            font-weight: bold;
        }

        /* 方向指示器 */
        #direction-indicator {
            text-align: center;
            font-size: 48px;
            margin: 10px 0;
            position: relative;
            z-index: 10;
        }

        #message-display {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
            position: relative;
            z-index: 10;
        }

        #telegram-button {
            width: 250px;
            height: 80px;
            background: linear-gradient(135deg, #00ffff 0%, #0088ff 100%);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0,255,255,0.4);
            transition: all 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        #telegram-button:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,255,255,0.6);
        }

        #telegram-button:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        #telegram-button:disabled {
            background: linear-gradient(135deg, #444 0%, #222 100%);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }

        #progress-container {
            margin: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 2px solid #ffd700;
            position: relative;
            z-index: 10;
        }

        #planet-name {
            color: #ffd700;
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffd700;
        }

        #progress-bar {
            width: 100%;
            height: 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            background-size: 200% 100%;
            border-radius: 15px;
            transition: width 0.5s ease;
            width: 0%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #satellite-display {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 25px;
            flex-wrap: wrap;
        }

        #combo-display {
            text-align: center;
            color: #ff00ff;
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 20px #ff00ff;
            opacity: 0;
            transition: opacity 0.3s ease;
            position: relative;
            z-index: 10;
        }

        #tutorial-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            padding: 40px;
            text-align: center;
        }

        #tutorial-content {
            max-width: 500px;
        }

        #tutorial-content h2 {
            font-size: 36px;
            margin-bottom: 25px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }

        #tutorial-content p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .highlight {
            color: #00ff88;
            font-weight: bold;
        }

        .danger-text {
            color: #ff4444;
            font-weight: bold;
        }

        #tutorial-button {
            padding: 18px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,255,136,0.4);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        #tutorial-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,255,136,0.6);
        }

        .penalty-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 68, 68, 0.95);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            animation: slideIn 0.3s ease;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(255,68,68,0.5);
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            padding: 40px;
            text-align: center;
        }

        #final-score {
            font-size: 48px;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 30px #ffd700;
        }

        .safe-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .danger-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
            animation: shake 0.5s infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* 外星人状态标签 */
        #alien-status {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
            position: relative;
            z-index: 10;
        }

        .status-safe {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .status-danger {
            color: #ff4444;
            text-shadow: 0 0 10px #ff4444;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1>🌌 星际电报员</h1>
            <div id="score-display">🛰️ 卫星: <span id="satellite-count">0</span></div>
        </div>

        <div id="alien-status">
            <span class="status-safe">👀 外星人背对着你（安全）</span>
        </div>

        <div id="alien-container">
            <div id="alien">
                <!-- 背面（默认显示 - 背身） -->
                <div class="alien-back">
                    <div class="alien-back-body">
                        <div class="antenna-back">
                            <div class="antenna-tip"></div>
                            <div class="antenna-stick"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 正面（转身时显示） -->
                <div class="alien-front">
                    <div class="alien-front-body">
                        <div class="antenna-front">
                            <div class="antenna-tip"></div>
                            <div class="antenna-stick"></div>
                        </div>
                        <div class="alien-eye left"></div>
                        <div class="alien-eye right"></div>
                        <div class="alien-mouth"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="status-text">
            <span class="safe-indicator"></span>
            准备开始...
        </div>
        
        <div id="hint-text">点击"开始游戏"按钮</div>

        <div id="combo-display">🔥 连击 x<span id="combo-count">0</span>!</div>

        <div id="message-display">
            点击"开始游戏"按钮开始你的星际通讯之旅！
        </div>

        <button id="telegram-button" disabled>
            📡 发送电报
        </button>

        <div id="progress-container">
            <div id="planet-name">🌍 地球轨道</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="satellite-display"></div>
        </div>

        <div id="tutorial-overlay">
            <div id="tutorial-content">
                <h2>🌌 欢迎来到星际电报员！</h2>
                <p>🎮 <strong>游戏玩法（一二三木头人）：</strong></p>
                <p>👀 <span class="highlight">外星人背身时（绿色背景）</span><br>→ 你可以疯狂点击发送电报！</p>
                <p>⚠️ <span class="danger-text">外星人转身时（红色背景）</span><br>→ 必须立即停止点击！</p>
                <p>💡 如果被抓到，下一轮时间会缩短！</p>
                <p>🎯 累积卫星，占领星球，征服宇宙！</p>
                <br>
                <p>📡 准备好成为最棒的星际电报员了吗？</p>
                <button id="tutorial-button" onclick="startGame()">开始游戏</button>
            </div>
        </div>

        <div id="game-over">
            <div id="tutorial-content">
                <h2>🌌 恭喜！</h2>
                <p>你成功占领了宇宙！</p>
                <div id="final-score">最终得分: <span id="final-score-value">0</span></div>
                <p>🛰️ 总卫星数: <span id="final-satellites">0</span></p>
                <p>🔥 最高连击: <span id="final-combo">0</span></p>
                <br>
                <button id="tutorial-button" onclick="restartGame()">再来一次</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            isRunning: false,
            isSafe: false,
            satellites: 0,
            combo: 0,
            maxCombo: 0,
            penaltyLevel: 0,
            currentPlanet: 0,
            telegramClicks: 0,
            requiredClicks: 1,
            currentMessage: '',
            safeDuration: 5000,
            dangerDuration: 1500,
            tutorialStep: 0
        };

        // 星球配置
        const planets = [
            { name: '🌍 地球轨道', required: 5, emoji: '🌍' },
            { name: '🌙 月球基地', required: 15, emoji: '🌙' },
            { name: '🔴 火星殖民', required: 30, emoji: '🔴' },
            { name: '🟤 木星系统', required: 50, emoji: '🟤' },
            { name: '🪐 土星环', required: 80, emoji: '🪐' },
            { name: '⭐ 银河系中心', required: 120, emoji: '⭐' },
            { name: '🌌 宇宙霸主', required: 200, emoji: '🌌' }
        ];

        // 搞笑电报库
        const telegramMessages = {
            short: [
                "Hi",
                "你好",
                "在吗",
                "外星人你好",
                "我是地球人",
                "不要回头",
                "我在这里",
                "收到请回复",
                "over",
                "我是谁"
            ],
            medium: [
                "外星人你的天线歪了",
                "能不能别老回头啊",
                "我是地球派来的使者",
                "你们星球有Wi-Fi吗",
                "我带了地球上的特产",
                "外星人你饿不饿",
                "你们老板凶不凶",
                "能不能给我签个名",
                "我其实是个机器人",
                "你们加班吗"
            ],
            long: [
                "尊敬的外星人总公司人力资源部负责人",
                "我叫张三今年28岁想应聘外星人实习生",
                "你们星球的房价贵不贵有没有住房公积金",
                "外星人先生我能问你一个问题吗你愿意嫁到地球来吗",
                "我朋友说看到UFO但我说是灯光反射他不相信"
            ]
        };

        // DOM元素
        const alien = document.getElementById('alien');
        const alienStatus = document.getElementById('alien-status');
        const statusText = document.getElementById('status-text');
        const hintText = document.getElementById('hint-text');
        const messageDisplay = document.getElementById('message-display');
        const telegramButton = document.getElementById('telegram-button');
        const satelliteCount = document.getElementById('satellite-count');
        const progressFill = document.getElementById('progress-fill');
        const planetName = document.getElementById('planet-name');
        const satelliteDisplay = document.getElementById('satellite-display');
        const comboDisplay = document.getElementById('combo-display');
        const comboCount = document.getElementById('combo-count');
        const tutorialOverlay = document.getElementById('tutorial-overlay');
        const gameOverScreen = document.getElementById('game-over');

        // 开始游戏
        function startGame() {
            tutorialOverlay.style.display = 'none';
            gameState.isRunning = true;
            gameState.tutorialStep = 1;
            telegramButton.disabled = false;
            nextRound();
        }

        // 下一轮
        function nextRound() {
            if (!gameState.isRunning) return;

            // 重置状态 - 背身（安全）
            gameState.isSafe = true;
            gameState.telegramClicks = 0;
            
            // 选择电报
            const messageType = getRandomMessageType();
            gameState.currentMessage = getRandomMessage(messageType);
            gameState.requiredClicks = getRequiredClicks(messageType);
            
            // 更新UI - 背身状态
            alien.classList.remove('turned');
            statusText.innerHTML = '<span class="safe-indicator"></span>安全！快发报！';
            statusText.className = '';
            alienStatus.innerHTML = '<span class="status-safe">👀 外星人背对着你（安全）</span>';
            hintText.textContent = '👀 外星人背身，抓紧时间点击！';
            hintText.style.color = '#00ff88';
            messageDisplay.textContent = `📡 ${gameState.currentMessage}`;
            telegramButton.disabled = false;
            telegramButton.textContent = `📡 发送电报 (0/${gameState.requiredClicks})`;

            // 安全期（背身）
            setTimeout(() => {
                if (gameState.isSafe && gameState.isRunning) {
                    turnAround();
                }
            }, gameState.safeDuration);
        }

        // 外星人转身
        function turnAround() {
            if (!gameState.isRunning) return;

            gameState.isSafe = false;
            alien.classList.add('turned');
            statusText.innerHTML = '<span class="danger-indicator"></span>危险！停止发送！';
            statusText.className = 'danger';
            alienStatus.innerHTML = '<span class="status-danger">👁️ 外星人看着你（危险）</span>';
            hintText.textContent = '⚠️ 外星人转过身了！不要动！';
            hintText.style.color = '#ff4444';
            telegramButton.disabled = true;

            // 危险期结束
            setTimeout(() => {
                if (gameState.isRunning) {
                    nextRound();
                }
            }, gameState.dangerDuration);
        }

        // 发送电报（按钮点击）
        telegramButton.addEventListener('click', () => {
            if (!gameState.isSafe || !gameState.isRunning) {
                // 在危险期点击了！
                caught();
                return;
            }

            gameState.telegramClicks++;
            
            if (gameState.telegramClicks >= gameState.requiredClicks) {
                // 成功发送
                sendSuccess();
            } else {
                // 更新按钮文本
                telegramButton.textContent = `📡 发送中... (${gameState.telegramClicks}/${gameState.requiredClicks})`;
            }
        });

        // 成功发送电报
        function sendSuccess() {
            // 增加卫星
            let satellitesEarned = getSatellitesForMessage();
            
            // 连击加成
            gameState.combo++;
            if (gameState.combo > gameState.maxCombo) {
                gameState.maxCombo = gameState.combo;
            }
            
            let multiplier = 1;
            if (gameState.combo >= 10) {
                multiplier = 2.0;
            } else if (gameState.combo >= 5) {
                multiplier = 1.5;
            } else if (gameState.combo >= 3) {
                multiplier = 1.2;
            }
            
            satellitesEarned = Math.floor(satellitesEarned * multiplier);
            gameState.satellites += satellitesEarned;
            
            // 显示连击
            if (gameState.combo >= 3) {
                comboCount.textContent = gameState.combo;
                comboDisplay.style.opacity = '1';
                setTimeout(() => {
                    comboDisplay.style.opacity = '0';
                }, 1500);
            }
            
            // 更新UI
            updateUI();
            
            // 显示成功消息
            messageDisplay.textContent = `✅ 发送成功！+${satellitesEarned}颗卫星`;
            telegramButton.disabled = true;
            
            // 检查是否通关
            if (gameState.currentPlanet >= planets.length - 1 && 
                gameState.satellites >= planets[gameState.currentPlanet].required) {
                gameWin();
            }
        }

        // 被抓到
        function caught() {
            gameState.combo = 0;
            gameState.penaltyLevel = Math.min(gameState.penaltyLevel + 1, 3);
            
            // 应用惩罚
            applyPenalty();
            
            // 显示惩罚
            showPenalty();
            
            // 更新按钮状态
            telegramButton.disabled = true;
            statusText.innerHTML = '<span class="danger-indicator"></span>被抓到了！';
            statusText.className = 'danger';
            hintText.textContent = '❌ 哎呀！外星人看到你了！';
            hintText.style.color = '#ff4444';
        }

        // 应用惩罚
        function applyPenalty() {
            if (gameState.penaltyLevel === 1) {
                gameState.safeDuration = Math.max(3000, gameState.safeDuration - 500);
            } else if (gameState.penaltyLevel === 2) {
                gameState.safeDuration = Math.max(3000, gameState.safeDuration - 1000);
                gameState.dangerDuration = Math.min(3000, gameState.dangerDuration + 500);
            } else if (gameState.penaltyLevel >= 3) {
                gameState.safeDuration = Math.max(2000, gameState.safeDuration - 2000);
                gameState.dangerDuration = Math.min(3000, gameState.dangerDuration + 500);
            }
        }

        // 显示惩罚提示
        function showPenalty() {
            const penaltyTexts = ['', '轻微生气', '中度生气', '暴走模式'];
            const penaltyColors = ['', '#ffaa00', '#ff6600', '#ff0000'];
            
            const indicator = document.createElement('div');
            indicator.className = 'penalty-indicator';
            indicator.textContent = `⚠️ 外星人${penaltyTexts[gameState.penaltyLevel]}!`;
            indicator.style.background = penaltyColors[gameState.penaltyLevel];
            
            document.getElementById('game-container').appendChild(indicator);
            
            setTimeout(() => {
                indicator.remove();
            }, 2000);
        }

        // 更新UI
        function updateUI() {
            satelliteCount.textContent = gameState.satellites;
            
            // 更新星球进度
            const planet = planets[gameState.currentPlanet];
            const progress = Math.min(100, (gameState.satellites / planet.required) * 100);
            progressFill.style.width = progress + '%';
            planetName.textContent = `${planet.emoji} ${planet.name}`;
            
            // 更新卫星显示
            updateSatelliteDisplay();
            
            // 检查是否升级
            if (gameState.satellites >= planet.required && gameState.currentPlanet < planets.length - 1) {
                gameState.currentPlanet++;
                updateUI();
            }
        }

        // 更新卫星显示
        function updateSatelliteDisplay() {
            satelliteDisplay.innerHTML = '';
            const displayCount = Math.min(gameState.satellites, 10);
            
            for (let i = 0; i < displayCount; i++) {
                const sat = document.createElement('span');
                sat.textContent = '🛰️';
                satelliteDisplay.appendChild(sat);
            }
            
            if (gameState.satellites > 10) {
                const more = document.createElement('span');
                more.textContent = `+${gameState.satellites - 10}`;
                more.style.color = '#ffd700';
                more.style.fontSize = '20px';
                satelliteDisplay.appendChild(more);
            }
        }

        // 游戏胜利
        function gameWin() {
            gameState.isRunning = false;
            telegramButton.disabled = true;
            
            document.getElementById('final-score-value').textContent = gameState.satellites;
            document.getElementById('final-satellites').textContent = gameState.satellites;
            document.getElementById('final-combo').textContent = gameState.maxCombo;
            
            gameOverScreen.style.display = 'flex';
        }

        // 重新开始
        function restartGame() {
            gameState.isRunning = false;
            gameState.isSafe = false;
            gameState.satellites = 0;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.penaltyLevel = 0;
            gameState.currentPlanet = 0;
            gameState.safeDuration = 5000;
            gameState.dangerDuration = 1500;
            
            alien.classList.remove('turned');
            gameOverScreen.style.display = 'none';
            tutorialOverlay.style.display = 'flex';
            
            updateUI();
        }

        // 工具函数
        function getRandomMessageType() {
            const rand = Math.random();
            if (rand < 0.4) return 'short';
            if (rand < 0.7) return 'medium';
            return 'long';
        }

        function getRandomMessage(type) {
            const messages = telegramMessages[type];
            return messages[Math.floor(Math.random() * messages.length)];
        }

        function getRequiredClicks(type) {
            switch(type) {
                case 'short': return 1;
                case 'medium': return 3;
                case 'long': return 5;
            }
        }

        function getSatellitesForMessage() {
            if (gameState.requiredClicks === 1) return 1;
            if (gameState.requiredClicks === 3) return 3;
            return 5;
        }

        // 初始化UI
        updateUI();
    </script>
</body>
</html>
